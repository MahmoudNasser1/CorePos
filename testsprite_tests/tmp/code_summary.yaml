version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 15
  - Tailwind CSS 4
  - Radix UI
  - React Query
  - Zustand
routes:
  - path: /login
    file: src/app/(auth)/login/page.tsx
    auth_required: false
    description: User login page
  - path: /register
    file: src/app/(auth)/register/page.tsx
    auth_required: false
    description: New user registration
  - path: /dashboard
    file: src/app/(dashboard)/dashboard/page.tsx
    auth_required: true
    description: Main dashboard analytics
  - path: /dashboard/pos
    file: src/app/(dashboard)/dashboard/pos/page.tsx
    auth_required: true
    description: Point of Sale interface
  - path: /dashboard/inventory
    file: src/app/(dashboard)/dashboard/inventory/page.tsx
    auth_required: true
    description: Inventory and product management
  - path: /dashboard/sales
    file: src/app/(dashboard)/dashboard/sales/page.tsx
    auth_required: true
    description: Sales invoices and history
features:
  - name: Authentication
    description: User login and session management
    files:
      - src/app/(auth)/login/page.tsx
      - src/app/api/auth/logout/route.ts
    entry_route: /login
    user_interactions:
      - Fill email and password
      - Click login button
      - See dashboard on success
    api_calls:
      - method: POST
        endpoint: /auth/login
    auth_required: false
  - name: Inventory Management
    description: CRUD operations for products and categories
    files:
      - src/app/(dashboard)/dashboard/inventory/page.tsx
    entry_route: /dashboard/inventory
    user_interactions:
      - Click add product
      - Fill product details
      - Click save
    api_calls:
      - method: POST
        endpoint: /inventory/products
    auth_required: true
  - name: POS Sale
    description: Processing retail sales via POS interface
    files:
      - src/app/(dashboard)/dashboard/pos/page.tsx
    entry_route: /dashboard/pos
    user_interactions:
      - Select products
      - Change quantity
      - Click pay and complete sale
    api_calls:
      - method: POST
        endpoint: /finance/pos-sale
    auth_required: true
known_limitations: []
