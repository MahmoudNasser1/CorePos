name: deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pos
          POSTGRES_PASSWORD: pos
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U pos -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      TEST_DATABASE_BASE_URL: postgres://pos:pos@localhost:5433/postgres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Backend tests
        run: npm run test --workspace @pos-sahl/backend

      - name: Build backend
        run: npm run backend:build

      - name: Build frontend
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify

    steps:
      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          DEPLOY_RESTART_CMD: ${{ secrets.DEPLOY_RESTART_CMD }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: DEPLOY_DIR,DEPLOY_RESTART_CMD
          script_stop: true
          script: |
            set -euo pipefail

            if [ -n "${DEPLOY_RESTART_CMD:-}" ]; then
              echo "Running deploy command..."
              bash -lc "$DEPLOY_RESTART_CMD"
            else
              echo "DEPLOY_RESTART_CMD is empty; skipping deploy."
            fi
