name: deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build backend
        run: npm run backend:build

      - name: Build frontend
        run: npm run build

      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          DEPLOY_RESTART_CMD: ${{ secrets.DEPLOY_RESTART_CMD }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: DEPLOY_DIR,DEPLOY_RESTART_CMD
          script_stop: true
          script: |
            set -euo pipefail

            if [ -z "${DEPLOY_DIR:-}" ]; then
              echo "DEPLOY_DIR secret is required"
              exit 1
            fi

            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "DEPLOY_DIR does not exist on server: $DEPLOY_DIR"
              exit 1
            fi

            cd "$DEPLOY_DIR"

            if [ -n "${DEPLOY_RESTART_CMD:-}" ]; then
              echo "Running deploy command..."
              bash -lc "$DEPLOY_RESTART_CMD"
            else
              echo "DEPLOY_RESTART_CMD is empty; skipping deploy."
            fi
